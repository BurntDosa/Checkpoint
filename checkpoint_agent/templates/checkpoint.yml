name: Code Checkpoint

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  # Job 1: Process commits on any branch push
  checkpoint-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checkpoint
        run: pip install checkpoint-agent

      - name: Run Checkpoint Agent & Update Contexts
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get human-authored commits that were pushed (exclude bot commits)
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # New branch — only process commits not already on main/master
            RAW_COMMITS=$(git rev-list ${{ github.sha }} --not origin/main origin/master 2>/dev/null || echo "")
          else
            RAW_COMMITS=$(git rev-list ${{ github.event.before }}..${{ github.sha }} 2>/dev/null || echo "")
          fi

          # Filter out bot commits
          COMMITS=$(git log --format="%H %ae" ${{ github.event.before }}..${{ github.sha }} 2>/dev/null \
            | grep -v "agent@codecheckpoint.local" \
            | grep -v "noreply@github.com" \
            | awk '{print $1}' || echo "$RAW_COMMITS")

          # Generate checkpoint for each pushed commit
          if [ -n "$COMMITS" ]; then
            echo "Generating checkpoints for pushed commits..."
            for commit in $COMMITS; do
              echo "  Processing commit: $commit"
              checkpoint --commit "$commit" || echo "Failed to generate checkpoint for $commit"
            done
          else
            echo "No new commits to process"
          fi

          # Update catchup summaries for all active developers (skip all authors in this push)
          echo "Generating catchup summaries..."
          SKIP_EMAILS=$(git log --format='%ae' ${{ github.event.before }}..${{ github.sha }} 2>/dev/null | sort -u | tr '\n' ',' | sed 's/,$//')
          checkpoint --catchup-all --catchup-skip "$SKIP_EMAILS"

          # Generate MASTER_CONTEXT.md if it doesn't exist yet
          if [ ! -f "MASTER_CONTEXT.md" ]; then
            echo "MASTER_CONTEXT.md not found — generating initial master context..."
            checkpoint --onboard
          fi

      - name: Commit Catchup Summaries
        run: |
          git config --global user.name 'Checkpoint Agent'
          git config --global user.email 'agent@codecheckpoint.local'
          git add checkpoints/ MASTER_CONTEXT.md 2>/dev/null || true
          git commit -m "docs: update catchups for ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref }}

  # Job 2: Generate per-commit checkpoints and PR summary for open/updated PRs
  checkpoint-pr:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checkpoint
        run: pip install checkpoint-agent

      - name: Generate Per-Commit Checkpoints & PR Summary
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "Processing PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "  Base: ${BASE_SHA} → Head: ${HEAD_SHA}"

          # Generate checkpoint for each human-authored commit in the PR range
          COMMITS=$(git log "${BASE_SHA}..${HEAD_SHA}" --format="%H %ae" 2>/dev/null \
            | grep -v "agent@codecheckpoint.local" \
            | grep -v "noreply@github.com" \
            | awk '{print $1}' || echo "")
          if [ -n "$COMMITS" ]; then
            echo "Generating per-commit checkpoints..."
            for commit in $COMMITS; do
              echo "  Processing commit: $commit"
              checkpoint --commit "$commit" || echo "Failed to generate checkpoint for $commit"
            done
          fi

          # Generate PR-level summary
          echo "Generating PR summary..."
          checkpoint --pr "${PR_NUMBER}" "${BASE_SHA}" "${HEAD_BRANCH}" "${PR_TITLE}"

      - name: Commit PR Summary & Catchups
        run: |
          git config --global user.name 'Checkpoint Agent'
          git config --global user.email 'agent@codecheckpoint.local'
          git add checkpoints/
          git commit -m "docs: add PR summary & catchups for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git pull --rebase origin ${{ github.event.pull_request.head.ref }} || true
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  # Job 3: Regenerate master context when a PR is merged to main
  update-master-context:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout base branch post-merge
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checkpoint
        run: pip install checkpoint-agent

      - name: Regenerate Master Context
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "PR #${{ github.event.pull_request.number }} merged — regenerating MASTER_CONTEXT.md..."
          checkpoint --onboard

      - name: Commit Updated Master Context
        run: |
          git config --global user.name 'Checkpoint Agent'
          git config --global user.email 'agent@codecheckpoint.local'
          git add MASTER_CONTEXT.md
          git commit -m "docs: regenerate MASTER_CONTEXT.md after PR #${{ github.event.pull_request.number }} merge" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
