name: Code Checkpoint

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  checkpoint:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for diffs

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Checkpoint Agent & Update Contexts
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          # Get list of commits that were pushed
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # New branch - get all commits
            COMMITS=$(git rev-list ${{ github.sha }})
          else
            # Existing branch - get commits between before and after
            COMMITS=$(git rev-list ${{ github.event.before }}..${{ github.sha }} 2>/dev/null || echo "")
          fi
          
          # Generate checkpoint for each pushed commit
          if [ -n "$COMMITS" ]; then
            echo "Generating checkpoints for pushed commits..."
            for commit in $COMMITS; do
              echo "  Processing commit: $commit"
              python main.py --commit "$commit" || echo "Failed to generate checkpoint for $commit"
            done
          else
            echo "No new commits to process"
          fi

          # Update catchup summaries for all active developers
          echo "Generating catchup summaries..."
          python main.py --catchup-all
          
      - name: Commit Checkpoint & Context
        run: |
          git config --global user.name 'Checkpoint Agent'
          git config --global user.email 'agent@codecheckpoint.local'
          git add checkpoints/
          git add MASTER_CONTEXT.md || echo "Master Context not changed"
          git commit -m "docs: update master context & catchups for ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
