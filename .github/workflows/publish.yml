name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For trusted publishing (OIDC)
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify built version
        run: |
          ls dist/
          # Fail if the built version doesn't match the tag
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if ! ls dist/*"${VERSION}"* 1>/dev/null 2>&1; then
            echo "::error::Built artifacts don't match tag ${TAG}. Expected version ${VERSION} in dist/"
            ls dist/
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing (no API token needed if configured on PyPI)
        # Alternatively, set api-token: ${{ secrets.PYPI_API_TOKEN }}
